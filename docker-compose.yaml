version: "3.8"

services:
  transfer:
    image: dutchcoders/transfer.sh:latest
    restart: unless-stopped
    ports:
      - "3210:8080"
    volumes:
      - ./data:/data
    environment:
      # Base URL - change this to your domain
      - BASEDIR=/data
      - PROVIDER=local
      # Max upload size (default 10GB)
      - MAX_UPLOAD_SIZE=5368709120
      # File expiration (default 14 days in seconds)
      - PURGE_DAYS=14
      - PURGE_INTERVAL=1
      # Rate limiting
      - RATE_LIMIT=10
      # Optional: enable web interface
      - WEB_PATH=/web
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  transfer-data:
